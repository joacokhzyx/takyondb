name: TakyonDB CI

on:
  push:
    branches: [ "master" ]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [ "master" ]

jobs:
  build-and-test:
    name: Build & Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # Cross-platform targets
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [20.x]

    steps:
    - uses: actions/checkout@v4

    - name: Setup Zig
      uses: mlugg/setup-zig@v1
      with:
        version: 0.12.0

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}

    - name: Build Zig Core (ReleaseSafe)
      run: zig build -Doptimize=ReleaseSafe

    - name: Install Node Dependencies
      run: npm install
      # Assuming package.json is at the root and configures node-gyp

    - name: Build C++ N-API Bridge
      run: npm run build:bridge || node-gyp rebuild

    - name: Run E2E Zero-Copy Test
      run: node scripts/e2e_zerocopy_test.js

    - name: Run Chaos Engine Benchmark
      run: node scripts/benchmark_chaos.js

  release:
    name: Create GitHub Release & Publish to NPM
    needs: build-and-test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'
      
      - name: Build TypeScript SDK
        run: |
          cd src/sdk/ts
          npm ci
          npm run build

      - name: Publish Package to NPM
        run: |
          cd src/sdk/ts
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          files: |
            zig-out/bin/*
            zig-out/lib/*
